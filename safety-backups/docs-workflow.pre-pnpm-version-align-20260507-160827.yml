name: Deploy Noctra Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: noctra-docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    env:
      GITHUB_PAGES_BASE: /noctra/
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate professional docs data
        run: node scripts/generate-professional-docs-data.mjs

      - name: Verify JSON
        run: node scripts/verify-json.mjs

      - name: Run docs audits
        run: |
          node scripts/audit-package-json-integrity.mjs
          node scripts/audit-date-time-removal-state.mjs
          node scripts/audit-docs-mantine-style-requirements.mjs
          node scripts/audit-docs-full-preset-coverage.mjs
          node scripts/audit-docs-runtime-demo-quality.mjs
          node scripts/audit-docs-real-runtime-render.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Create SPA fallback
        run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - name: Final Noctra docs release gate
        run: node scripts/audit-final-noctra-docs-release.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4